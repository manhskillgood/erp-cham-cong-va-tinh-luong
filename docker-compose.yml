services:
  postgres_odoo-base:
    image: postgres:10-alpine
    container_name: postgres_odoo-base
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    ports:
      - "5431:5432"
    volumes:
      - postgres:/var/lib/postgresql/data
    restart: unless-stopped

  odoo:
    image: odoo:15
    container_name: odoo15
    depends_on:
      - postgres_odoo-base
    ports:
      - "8069:8069"
    volumes:
      - ./addons:/mnt/extra-addons
    environment:
      - HOST=postgres_odoo-base
      - USER=odoo
      - PASSWORD=odoo
    restart: unless-stopped

volumes:
  postgres:

